name: 每日更新股期收盤價與未沖銷口數

# 排程說明（GitHub cron 為 UTC，且為 best-effort，可能延遲數十分鐘至數小時）
#  - 03:00 UTC = 台北 11:00：期交所已公布前一交易日行情（盤後時段 17:25~次日05:00 收完才定案），補抓未沖銷口數
#  - 12:00 UTC = 台北 20:00：證交所/櫃買已公布當日收盤價
on:
  schedule:
    - cron: '0 3 * * 1-6'
    - cron: '0 12 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Fetch closing prices and open interest
        run: python fetch_prices.py
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain prices.json index.html)" ]; then
            git add prices.json index.html
            git commit -m "auto update daily data"
            git push
          else
            echo "no change"
          fi
